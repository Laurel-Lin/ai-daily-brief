name: Daily AI Brief

on:
  workflow_dispatch:
  schedule:
    # Asia/Shanghai 06:14 = UTC 22:14 前一天。
    - cron: "14 22 * * *"

permissions:
  contents: write

jobs:
  daily-ai-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily brief
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          MIN_SCORE: ${{ vars.MIN_SCORE || '75' }}
          MAX_ITEMS: ${{ vars.MAX_ITEMS || '8' }}
          TIMEZONE: Asia/Shanghai
        run: python scripts/main.py

      - name: Resolve digest metadata
        id: meta
        shell: bash
        run: |
          DATE=$(python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path("data/latest.json").read_text(encoding="utf-8"))
          print(data["date"])
          PY
          )
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "digest=digests/$DATE.md" >> "$GITHUB_OUTPUT"
          echo "artifact=ai-daily-brief-$DATE" >> "$GITHUB_OUTPUT"

      - name: Commit generated files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add digests data logs
          if git diff --cached --quiet; then
            echo "No generated file changes to commit."
          else
            git commit -m "chore: add AI daily brief ${{ steps.meta.outputs.date }}"
            git push
          fi

      - name: Upload daily Markdown artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact }}
          path: ${{ steps.meta.outputs.digest }}
          if-no-files-found: error
